  /LinkRiotAccount:
    post:
      operationId: LinkRiotAccount_create
      description: |-
        Link the authenticated user's account to their Riot Games identity.

        The frontend is responsible for performing the full RSO OAuth2 authorization
        flow and obtaining the tokens.  It then sends the token payload here so the
        backend can:

        1. Validate the access token against the Riot Account API.
        2. Retrieve the player's PUUID, game name and tagline.
        3. Persist everything on the ``AuthUser`` model for later use (e.g. fetching
           match history, including private games).
      tags:
      - RiotAccount
      - patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkRiotAccountRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LinkRiotAccountRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LinkRiotAccountRequest'
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkRiotAccountResponse'
          description: ''
