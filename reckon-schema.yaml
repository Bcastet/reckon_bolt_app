components:
  schemas:
    AddAccount:
      type: object
      properties:
        account_name:
          type: string
          description: Account name in {riot_id}-{tagline} form
          maxLength: 255
        server:
          type: string
          description: Server of the account
          maxLength: 255
        source:
          type: string
          description: Source of the information
          maxLength: 255
      required:
      - account_name
      - server
    AuthToken:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        token:
          type: string
          readOnly: true
      required:
      - password
      - token
      - username
    ChangePassword:
      type: object
      properties:
        old_password:
          type: string
        new_password:
          type: string
      required:
      - new_password
      - old_password
    ClientOrganization:
      type: object
      properties:
        id:
          type: string
          maxLength: 127
        teams:
          type: string
          maxLength: 127
        grid_api_key:
          type: string
          maxLength: 255
        plan:
          type: string
          maxLength: 127
        subscription_date:
          type: string
          format: date
          nullable: true
        subscription_ends:
          type: string
          format: date
          nullable: true
      required:
      - grid_api_key
      - id
      - plan
      - teams
    ClientOrganizationAggregate:
      type: object
      properties:
        id:
          type: string
          maxLength: 127
        teams:
          type: string
          maxLength: 127
        grid_api_key:
          type: string
          maxLength: 255
        plan:
          type: string
          maxLength: 127
        subscription_date:
          type: string
          format: date
          nullable: true
        subscription_ends:
          type: string
          format: date
          nullable: true
      required:
      - grid_api_key
      - id
      - plan
      - teams
    CompetitiveDraftSlots:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        date:
          type: string
          format: date-time
        split:
          type: string
          maxLength: 50
        phase:
          type: string
          maxLength: 50
