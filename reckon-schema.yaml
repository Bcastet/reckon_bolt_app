  /ScrimsData/item/{id}/upload:
    post:
      operationId: upload_scrim_game
      description: |-
        Upload a scrim game via **multipart/form-data**.

        **Fields**: `team1` (team ID), `team2` (team ID)

        **Files**: `agnostic_match_history` (Riot match history JSON)

        SoloQAccount entries are auto-created for unknown PUUIDs, but each account must have a `player_id` linked before the upload can proceed.
      summary: Manually upload a scrim game
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - ScrimsData
      - upload
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadScrimGameRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UploadScrimGameRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadScrimGameRequest'
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadScrimGameSuccess'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadScrimGameError'
          description: |-
            Returned when:
            - Required fields (`team1`, `team2`, `agnostic_match_history`) are missing
            - A team ID does not match any existing team
            - The agnostic match history file cannot be parsed
